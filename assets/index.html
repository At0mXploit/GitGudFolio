<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title></title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.0/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.1/css/all.css"
      integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.4.1.min.js"
      integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo="
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/magic-grid/dist/magic-grid.min.js"></script>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <div id="loading">
      <div id="spinner"></div>
      <div class="scramble-text"></div>
    </div>
    <div id="profile">
      <div id="profile_img"></div>
      <div id="username">
        <div id="fullname"></div>
      </div>
      <div id="userbio"></div>
      <div id="about"></div>
    </div>
    <div id="display">
      <div id="work">
        <h1>Work.</h1>
        <div class="projects" id="work_section"></div>
      </div>
      <div id="forks" style="display:none;">
        <h1>Forks.</h1>
        <div class="projects" id="forks_section"></div>
      </div>
      <div id="friends" style="display:none;">
        <h1>Friends.</h1>
        <div class="projects" id="friends_section"></div>
      </div>
      <div id="blog_section">
        <h1>Blog.</h1>
        <div id="blogs"></div>
      </div>
      <div id="footer">
        <a href="https://github.com/At0mXploit" target="_blank"
          >made on earth by a human</a
        >
      </div>
    </div>
    <script id="scramble-config" type="application/json">{"enabled":false,"phrases":[]}</script>
    <script type="text/javascript">
      (function() {
        var scrambleCfg = {};
        try { scrambleCfg = JSON.parse(document.getElementById("scramble-config").textContent); } catch(e) {}

        function hideLoading() {
          document.getElementById("loading").classList.add("animated");
          document.getElementById("loading").classList.add("fadeOut");
          setTimeout(function() {
            document.getElementById("loading").style.display = "none";
          }, 800);
        }

        if (scrambleCfg.enabled && scrambleCfg.phrases && scrambleCfg.phrases.length > 0) {
          document.getElementById("spinner").style.display = "none";
          document.querySelector(".scramble-text").style.display = "block";

          function TextScramble(el) {
            this.el = el;
            this.chars = "!<>-_\\/[]{}—=+*^?#________";
            this.update = this.update.bind(this);
          }
          TextScramble.prototype.setText = function(newText) {
            var oldText = this.el.innerText;
            var length = Math.max(oldText.length, newText.length);
            var self = this;
            var promise = new Promise(function(resolve) { self.resolve = resolve; });
            self.queue = [];
            for (var i = 0; i < length; i++) {
              var from = oldText[i] || "";
              var to = newText[i] || "";
              var start = Math.floor(Math.random() * 40);
              var end = start + Math.floor(Math.random() * 40);
              self.queue.push({ from: from, to: to, start: start, end: end });
            }
            cancelAnimationFrame(self.frameRequest);
            self.frame = 0;
            self.update();
            return promise;
          };
          TextScramble.prototype.update = function() {
            var output = "";
            var complete = 0;
            for (var i = 0, n = this.queue.length; i < n; i++) {
              var item = this.queue[i];
              if (this.frame >= item.end) {
                complete++;
                output += item.to;
              } else if (this.frame >= item.start) {
                if (!item.char || Math.random() < 0.28) {
                  item.char = this.chars[Math.floor(Math.random() * this.chars.length)];
                }
                output += '<span class="dud">' + item.char + "</span>";
              } else {
                output += item.from;
              }
            }
            this.el.innerHTML = output;
            if (complete === this.queue.length) {
              this.resolve();
            } else {
              this.frameRequest = requestAnimationFrame(this.update);
              this.frame++;
            }
          };

          var el = document.querySelector(".scramble-text");
          var fx = new TextScramble(el);
          var phrases = scrambleCfg.phrases;
          var counter = 0;
          var next = function() {
            fx.setText(phrases[counter]).then(function() {
              setTimeout(function() {
                counter++;
                if (counter < phrases.length) {
                  next();
                } else {
                  setTimeout(hideLoading, 600);
                }
              }, 800);
            });
          };
          next();
        } else {
          setTimeout(function() {
            document.getElementById("loading").classList.add("animated");
            document.getElementById("loading").classList.add("fadeOut");
            setTimeout(function() {
              document.getElementById("loading").classList.remove("animated");
              document.getElementById("loading").classList.remove("fadeOut");
              document.getElementById("loading").style.display = "none";
            }, 800);
          }, 1500);
        }
      })();
      $.getJSON("blog.json", function(blog) {
        blog = blog || [];
        if (blog.length == 0) {
          return (document.getElementById("blog_section").style.display =
            "none");
        }
        for (var i = 0; i < blog.length; i++) {
          $("#blogs").append(`
            <a href="./blog/${blog[i].url_title}/" target="_blank">
                <section>
                    <img src="./blog/${blog[i].url_title}/${blog[i].top_image}">
                    <div class="blog_container">
                        <div class="section_title">${blog[i].title}</div>
                        <div class="about_section">
                            ${blog[i].sub_title}
                        </div>
                    </div>
                </section>
            </a>
            `);
        }
      }).fail(function() {
        return (document.getElementById("blog_section").style.display = "none");
      });
    </script>

    <script>
      const magicProjectsGrid = new MagicGrid({
        container: "#work_section",
        animate: false,
        gutter: 30, // default gutter size
        static: true,
        useMin: false,
        maxColumns: 2,
        useTransform: true
      });

      const magicForksGrid = new MagicGrid({
        container: "#forks_section",
        animate: false,
        gutter: 30, // default gutter size
        static: true,
        useMin: false,
        maxColumns: 2,
        useTransform: true
      });

      const magicFriendsGrid = new MagicGrid({
        container: "#friends_section",
        animate: false,
        gutter: 30,
        static: true,
        useMin: false,
        maxColumns: 2,
        useTransform: true
      });

      $("document").ready(() => {
        magicProjectsGrid.listen();
        magicForksGrid.listen();
        magicFriendsGrid.listen();
      });
    </script>
  </body>
</html>
